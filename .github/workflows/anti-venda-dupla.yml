name: Anti-venda-dupla (gatilho)

# B4 — Detecta vendas novas no Mercado Livre e dispara a cascata que pausa o
# mesmo SKU nos outros anuncios (ML + Shopee). Roda ISOLADO no GitHub (nao
# depende do Railway nem do n8n estarem de pe pra disparar).
#
# MODO: comeca em 'observacao' (so registra o que PAUSARIA, nao pausa de verdade).
# Quando voce confirmar que esta acertando, troque MODO para 'armado' abaixo.

on:
  schedule:
    - cron: '*/10 * * * *'    # a cada ~10 min (cron do GitHub e best-effort)
  workflow_dispatch:
    inputs:
      modo:
        description: 'observacao (so loga) ou armado (pausa de verdade)'
        required: false
        default: 'observacao'

jobs:
  gatilho:
    runs-on: ubuntu-latest
    steps:
      - name: Vendas novas online (ML) -> cascata
        env:
          API: https://wrx-api-production.up.railway.app
          MODO: ${{ github.event.inputs.modo || 'observacao' }}
        run: |
          set -euo pipefail
          echo "Gatilho de vendas ML no modo: $MODO"
          resp=$(curl -s -m 90 -X POST "$API/integracoes/processar-vendas-novas?modo=$MODO")
          echo "$resp" | jq '.' || echo "$resp"
          echo "Vendas novas: $(echo "$resp" | jq -r '.vendas_novas // 0' 2>/dev/null || echo 0)"

      - name: Estoque zerado (balcao/qualquer baixa) -> pausa em todas plataformas
        env:
          API: https://wrx-api-production.up.railway.app
          MODO: ${{ github.event.inputs.modo || 'observacao' }}
        run: |
          set -euo pipefail
          echo "Reconciliando estoque zerado no modo: $MODO"
          resp=$(curl -s -m 120 -X POST "$API/integracoes/reconciliar-estoque-zerado?modo=$MODO")
          echo "$resp" | jq '{ok,modo,skus_zerados,zerados_ainda_anunciados}' || echo "$resp"
          echo "Zerados ainda anunciados: $(echo "$resp" | jq -r '.zerados_ainda_anunciados // 0' 2>/dev/null || echo 0)"
