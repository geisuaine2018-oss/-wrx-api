name: Rede de seguranca anti-venda-dupla

# REDE DE SEGURANCA (leve): o PartsHub ja cuida do anti-venda-dupla em ML+Shopee
# (~99,7%). Este job so pega os POUCOS furos que escapam: pecas com estoque ZERADO
# (em pecas_estoque, a tabela fresca do PartsHub) que ainda tem anuncio ATIVO -> pausa.
# Roda 1x/dia. NAO reage a cada venda (o PartsHub ja faz isso melhor e mais rapido).

on:
  schedule:
    - cron: '0 11 * * *'    # 1x/dia ~08h BRT (11h UTC)
  workflow_dispatch:
    inputs:
      modo:
        description: 'observacao (so lista) ou armado (pausa os furos)'
        required: false
        default: 'armado'

jobs:
  rede-seguranca:
    runs-on: ubuntu-latest
    steps:
      - name: Pecas zeradas ainda anunciadas (furos do PartsHub) -> pausa
        env:
          API: https://wrx-api-production.up.railway.app
          MODO: ${{ github.event.inputs.modo || 'armado' }}
        run: |
          set -euo pipefail
          echo "Rede de seguranca anti-venda-dupla — modo: $MODO"
          resp=$(curl -s -m 120 -X POST "$API/integracoes/reconciliar-estoque-zerado?modo=$MODO")
          echo "$resp" | jq '{ok,modo,skus_zerados,skus_em_risco,anuncios_em_risco,ml,shopee,pausados}' || echo "$resp"
          risco=$(echo "$resp" | jq -r '.anuncios_em_risco // 0' 2>/dev/null || echo 0)
          echo "Furos encontrados (zerados ainda a venda): $risco"
